<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/contact.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Contactanos Aquí</title>
</head>
<body>
        <header class="index-header position-relative" id="inicio">
        <div class="position-absolute w-100 h-100 oscurecer-fondo z-1">
            <nav class="navbar navbar-expand-lg bg-success-subtle position-fixed w-100">
                <div class="container-fluid">
                    <a class="navbar-brand" href="./index.html">
                        <img class="logo-imagen rounded-circle" src="/img/logo-agencia.png" alt="logo agencia">
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link text-black" aria-current="page" href="/index.html">Inicio</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-black" href="/partial/nosotros.html">Sobre Nosotros</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-black" href="/partial/proyectos.html">Proyectos</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-black" href="/partial/contacto.html">Contacto</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>


    <main>
        <section class="contacto">
            <div class="container">

            <h2>Contáctanos</h2>
            <p>Completa el formulario y te responderemos pronto.</p>

            <form action="#" method="post" class="contact-form">

            <div class="input-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required >
            </div>

            <div class="input-group">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" placeholder="tuemail@gmail.com" required >
            </div>

            <div class="input-group">
                <label for="asunto">Asunto</label>
                <input type="text" id="asunto" name="asunto" placeholder="Consulta">
            </div>

            <div class="input-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje..." required></textarea>
            </div>

            <button type="submit">Enviar mensaje</button>

            </form>
            </div>
        </section>
    </main>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
